<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h3 class="card-title mb-0">THÔNG TIN CHI TIẾT SẢN PHẨM</h3>
                </div>
                <div class="card-body">
                    <table class="table table-borderless">
                        <tr>
                            <th width="40%">Mã sản phẩm:</th>
                            <td th:text="${sanPham.id}"></td>
                        </tr>
                        <tr>
                            <th>Tên sản phẩm:</th>
                            <td class="fw-bold text-primary" th:text="${sanPham.tenSanPham}"></td>
                        </tr>
                        <tr>
                            <th>Thuộc loại:</th>
                            <td>
                                <span class="badge bg-info text-dark" 
                                      th:text="${sanPham.loaiSanPham != null ? sanPham.loaiSanPham.tenLoai : 'N/A'}">
                                </span>
                            </td>
                        </tr>
                    </table>
                </div>
                <div class="card-footer text-center">
                    <a th:href="@{/san-pham/danh-sach}" class="btn btn-secondary">Quay lại danh sách</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>

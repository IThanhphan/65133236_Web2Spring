<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background-color: #343a40;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            padding: 12px;
            cursor: pointer;
            border-radius: 5px;
        }

        .sidebar ul li:hover {
            background-color: #495057;
        }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            height: 60px;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #ddd;
        }

        /* Content */
        .content {
            padding: 20px;
            flex: 1;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card p {
            font-size: 20px;
            font-weight: bold;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 10px;
            background: white;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Admin</h2>
        <ul>
            <li>Dashboard</li>
            <li>Users</li>
            <li>Products</li>
            <li>Orders</li>
            <li>Reports</li>
            <li>Settings</li>
        </ul>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- Header -->
        <div class="header">
            <h3>Dashboard</h3>
            <div>Welcome, Admin</div>
        </div>

        <!-- Content -->
        <div class="content">
            <div class="cards">
                <div class="card">
                    <h3>Users</h3>
                    <p>120</p>
                </div>
                <div class="card">
                    <h3>Products</h3>
                    <p>80</p>
                </div>
                <div class="card">
                    <h3>Orders</h3>
                    <p>45</p>
                </div>
                <div class="card">
                    <h3>Revenue</h3>
                    <p>$5,000</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            © 2026 Admin Dashboard
        </div>

    </div>

</body>
</html>

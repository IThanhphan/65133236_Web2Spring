<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hello Page</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
        }

        .box {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: white;
            color: #2575fc;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #ddd;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Hello 👋</h1>

    <!-- Nếu dùng Thymeleaf -->
    <p th:text="${message}">Chào mừng bạn đến với trang Hello!</p>

    <button onclick="alert('Xin chào bạn!')">Click me</button>
</div>

</body>
</html>

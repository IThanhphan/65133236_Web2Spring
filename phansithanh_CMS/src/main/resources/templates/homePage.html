<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
	    *{
	    margin:0;
	    padding:0;
	    box-sizing:border-box;
	    font-family: Arial, sans-serif;
		}
		
		.container{
		    width:100%;
		    height:100vh;
		    display:flex;
		    flex-direction:column;
		}
		
		/* HEADER */
		
		.header{
		    height:80px;
		    border:1px solid #999;
		    display:flex;
		    justify-content:space-between;
		    align-items:center;
		    padding:10px 20px;
		}
		
		.logo{
		    display:flex;
		    align-items:center;
		    gap:10px;
		}
		
		.logo img{
		    width:60px;
		}
		
		.user{
		    font-weight:bold;
		}
		
		/* MAIN */
		
		.main{
		    flex:1;
		    display:flex;
		}
		
		/* SIDEBAR */
		
		.sidebar{
		    width:220px;
		    border:1px solid #999;
		}
		
		.sidebar ul{
		    list-style:none;
		}
		
		.sidebar li{
		    padding:10px;
		    border-bottom:1px solid #999;
		    cursor:pointer;
		}
		
		.sidebar .title{
		    font-weight:bold;
		    background:#f2f2f2;
		}
		
		/* CONTENT */
		
		.content{
		    flex:1;
		    border:1px solid #999;
		    display:flex;
		    justify-content:center;
		    align-items:center;
		}
		
		/* FOOTER */
		
		.footer{
		    height:40px;
		    border:1px solid #999;
		    text-align:center;
		    line-height:40px;
		}
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <img src="logo.png" alt="logo">
            <div>
                <div>TRƯỜNG ĐẠI HỌC NHA TRANG</div>
                <div>KHOA CÔNG NGHỆ THÔNG TIN</div>
            </div>
        </div>

        <div class="user">
            [Phan Sĩ Thành]
        </div>
    </header>

    <!-- MAIN -->
    <div class="main">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <ul>
                <li class="title">Dashboard</li>
                <li>Page - List</li>
                <li>Page - Addnew</li>
                <li>Post - List</li>
                <li>Post - Addnew</li>
            </ul>
        </aside>

        <!-- CONTENT -->
        <section class="content">
            <h2>Content</h2>
        </section>

    </div>

    <!-- FOOTER -->
    <footer class="footer">
        ©2025 by Student Name – FIT.NTU
    </footer>

</div>

</body>
</html>
